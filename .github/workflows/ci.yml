name: CI
on:
  push:
    branches: [master]
    tags: '*'
  pull_request:
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            version: '1.12'
          - os: windows-latest
            arch: x64
            version: '1.12'
          - os: macOS-latest
            arch: aarch64
            version: '1.12'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - name: Install Reseau and AwsHTTP from GitHub
        run: |
          julia --project -e '
            using Pkg
            Pkg.develop(url="https://github.com/JuliaServices/Reseau.jl")
            Pkg.develop(url="https://github.com/JuliaServices/AwsHTTP.jl")
            Pkg.instantiate()'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: 2
