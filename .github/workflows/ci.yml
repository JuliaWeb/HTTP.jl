name: CI

on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:
  release:

# Cancel superseded in-progress runs for the same PR. Pushes to master/release
# use the unique run_id as the group, so those are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    # Fail fast on a hung job instead of running to GitHub's 6h default. Clean
    # jobs finish in <=11m; 25m leaves headroom for cache-cold precompilation.
    timeout-minutes: 25
    # Prerelease Julia is informational; don't let it block merges.
    continue-on-error: ${{ matrix.version == 'pre' }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
          - 'pre'
        os:
          - ubuntu-latest
          - windows-latest
        arch:
          - x64
        include:
          - os: macOS-latest
            arch: aarch64
            version: 1
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      # TEMPORARY: Reseau.SOCKS ships in JuliaServices/Reseau.jl#123 and is not
      # registered yet. Pin Reseau to that PR head so dependency resolution
      # succeeds; revert the pin commits once Reseau >= 1.3.0 is registered.
      - name: Pin unreleased Reseau (remove once registered)
        shell: bash
        run: julia --project -e 'using Pkg; Pkg.add(url="https://github.com/JuliaServices/Reseau.jl", rev="59f4f3979df788300a0266b32d7f83a13369d062")'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      # TEMPORARY: see the matching step in the test job; revert once a Reseau
      # release with Reseau.SOCKS is registered.
      - name: Pin unreleased Reseau (remove once registered)
        run: |
          julia --project -e 'using Pkg; Pkg.add(url="https://github.com/JuliaServices/Reseau.jl", rev="59f4f3979df788300a0266b32d7f83a13369d062")'
          julia --project=docs -e 'using Pkg; Pkg.develop(path="."); Pkg.add(url="https://github.com/JuliaServices/Reseau.jl", rev="59f4f3979df788300a0266b32d7f83a13369d062")'
      - uses: julia-actions/julia-buildpkg@latest
      - uses: julia-actions/julia-docdeploy@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
